  <!-- Stop circle -->
  <circle cx="64" cy="60" r="32" fill="url(#stopGrad)" stroke="#b91c1c" stroke-width="2"/>
  
  <!-- White bar (stop sign style) -->
  <rect x="38" y="54" width="52" height="12" rx="2" fill="white"/>
</svg>
