<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked! 🐕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #3d7ea6 0%, #1a4a6e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      z-index: 10;
      padding: 20px;
    }

    .block-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .message {
      font-size: 20px;
      margin-bottom: 12px;
      opacity: 0.95;
    }

    .submessage {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .go-back-btn {
      display: inline-block;
      padding: 16px 40px;
      background: white;
      color: #3d7ea6;
      text-decoration: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      border: none;
    }

    .go-back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }




    /* Productivity counter */
    .productivity {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }

    .productivity span {
      font-weight: bold;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <!-- Main content -->
  <div class="container">
    <div class="block-icon">🚫</div>
    <h1>Site Blocked!</h1>
    <p class="message">This website has been blocked</p>
    <p class="submessage">Your productivity thanks you! 🎯</p>
    
    <button id="goBackBtn" class="go-back-btn">✕ Close Tab</button>
    
    <p class="productivity">
      Stay focused! Every blocked visit is a win. <span>🏆</span>
    </p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
