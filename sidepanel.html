<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocker</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Math Challenge Gate (child safety) -->
  <div id="challengeOverlay" class="challenge-overlay hidden">
    <div class="challenge-card">
      <div class="challenge-icon">🔒</div>
      <h2 class="challenge-title">Solve to Access</h2>
      <p class="challenge-subtitle">Answer the question to manage your blocklist</p>
      <p id="challengeQuestion" class="challenge-question"></p>
      <div class="challenge-input-group">
        <input type="number" id="challengeAnswer" placeholder="Your answer" autocomplete="off">
        <button id="challengeSubmit" class="btn-challenge">Unlock</button>
      </div>
      <p id="challengeError" class="challenge-error hidden">Incorrect — try again</p>
      <button id="challengeNewQuestion" class="btn-new-question">Different question</button>
    </div>
  </div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <a href="https://wise.com/pay/business/sandeepchadda?utm_source=open_link" target="_blank" class="donate-link" title="Support development">
        Donate
      </a>
      <a id="settingsLink" class="settings-link" title="Settings">
        ⚙️
      </a>
      <div class="header-top">
        <img src="icons/icon48.png" alt="Site Blocker" class="logo">
        <div class="header-text">
          <h1>Site Blocker</h1>
          <p class="subtitle">Block distracting websites</p>
        </div>
      </div>
      
      <!-- Master Toggle -->
      <div class="master-toggle-container">
        <span class="master-label">Blocking</span>
        <label class="toggle-switch master-toggle">
          <input type="checkbox" id="masterToggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <span id="masterStatus" class="master-status">ON</span>
      </div>
    </header>

    <!-- Add Site Section -->
    <div class="add-site-section">
      <div class="input-group">
        <input 
          type="text" 
          id="siteInput" 
          placeholder="Enter URL (e.g., x.com)"
          maxlength="253"
          autocomplete="off"
        >
        <button id="addSiteBtn" class="btn-add">
          <span class="btn-icon">+</span>
          Add
        </button>
      </div>
      <div id="inputError" class="input-error hidden"></div>
    </div>

    <!-- Counter -->
    <div class="counter-section">
      <span id="siteCounter" class="site-counter">0/100 sites</span>
    </div>

    <!-- Status Message -->
    <div id="statusMessage" class="status-message hidden"></div>

    <!-- Blocked Sites List -->
    <div class="sites-list-container">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg width="64" height="72" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Left half of cracked shield -->
            <path d="M32 4L6 16v20c0 16 11 28 26 32V40l-4-6 3-8-5-7 4-9V4z" fill="url(#shieldGradL)" opacity="0.85"/>
            <!-- Right half of cracked shield (offset) -->
            <path d="M32 4l26 12v20c0 16-11 28-26 32V40l4-6-3-8 5-7-4-9V4z" fill="url(#shieldGradR)" opacity="0.65" transform="translate(1.5,2)"/>
            <!-- Crack line -->
            <path d="M32 6 L30 15 L35 22 L29 30 L34 38 L32 48 L31 58" stroke="#1a2e3d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
            <!-- Lightning bolt accent in crack -->
            <path d="M33 18 L28 28 L33 27 L29 37" stroke="#5ba3c9" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <defs>
              <linearGradient id="shieldGradL" x1="6" y1="4" x2="32" y2="68" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#3d7ea6"/>
                <stop offset="100%" stop-color="#1a4a6e"/>
              </linearGradient>
              <linearGradient id="shieldGradR" x1="32" y1="4" x2="58" y2="68" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#5ba3c9"/>
                <stop offset="100%" stop-color="#2b5a7e"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <p>No sites blocked yet</p>
        <p class="empty-hint">Add a domain above to start blocking</p>
      </div>
      <ul id="sitesList" class="sites-list hidden"></ul>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="version">v1.1.0</span>
      <span class="divider">•</span>
      <span class="tagline">Stay focused! 🎯</span>
      <div class="copyright">© <a href="https://github.com/zozimustechnologies/" target="_blank">Zozimus Technologies</a></div>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
